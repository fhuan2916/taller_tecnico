{% extends "appbuilder/base.html" %}
{% block content %}
<div class="container" style="margin-top: 20px;">
    <div class="card bg-dark text-white border-secondary mb-4">
        <div class="card-header border-secondary" style="background-color: #2c3e50;">
            <h3 class="card-title mb-0"><i class="fa fa-chart-pie"></i> Panel de Analíticas Avanzadas</h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card bg-secondary text-white p-3">
                        <h5 class="text-center">Órdenes por Estado</h5>
                        <canvas id="chartEstados" width="400" height="250"></canvas>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card bg-secondary text-white p-3">
                        <h5 class="text-center">Tipos de Fallas Más Comunes</h5>
                        <canvas id="chartFallas" width="400" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // 1. Datos para Gráfico de Estados
    const ctxEstados = document.getElementById('chartEstados').getContext('2d');
    new Chart(ctxEstados, {
        type: 'bar',
        data: {
            labels: {{ estados_labels|tojson }},
            datasets: [{
                label: 'Cantidad de Órdenes',
                data: {{ estados_valores|tojson }},
                backgroundColor: ['#3498db', '#2ecc71', '#e74c3c', '#f1c40f', '#9b59b6'],
                borderWidth: 1
            }]
        },
        options: { 
            responsive: true,
            plugins: { legend: { labels: { color: 'white' } } },
            scales: { 
                x: { ticks: { color: 'white' } },
                y: { ticks: { color: 'white' }, beginAtZero: true }
            }
        }
    });

    // 2. Datos para Gráfico de Fallas
    const ctxFallas = document.getElementById('chartFallas').getContext('2d');
    new Chart(ctxFallas, {
        type: 'doughnut', // Gráfico de dona súper moderno
        data: {
            labels: {{ fallas_labels|tojson }},
            datasets: [{
                data: {{ fallas_valores|tojson }},
                backgroundColor: ['#1abc9c', '#e67e22', '#95a5a6', '#34495e', '#e74c3c'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: 'white' } } }
        }
    });
</script>
{% endblock %}
